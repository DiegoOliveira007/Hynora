<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hynora — Sala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --green:       #40916C;
      --green-dark:  #174732;
      --green-deep:  #0d2b1e;
      --green-light: #52b788;
      --green-pale:  #74c69d;
      --bg:          #0a1510;
      --surface:     rgba(23,71,50,0.25);
      --surface2:    rgba(64,145,108,0.12);
      --border:      rgba(64,145,108,0.22);
      --border2:     rgba(64,145,108,0.5);
      --text:        #d8f3dc;
      --muted:       #74c69d;
      --yt:          #FF0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pixelify Sans', monospace;
      background: var(--bg); color: var(--text);
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    /* Mobile: prevent keyboard resize from collapsing layout */
    @media (max-width: 640px) {
      body {
        /* Use fixed height so the virtual keyboard resize doesn't
           shrink the body and hide the chat. The sidebar is
           position:fixed so it handles its own scroll context. */
        height: 100vh;
        min-height: -webkit-fill-available;
      }
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── TOPBAR ── */
    #topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,21,16,0.97);
      backdrop-filter: blur(10px); flex-shrink: 0;
      flex-wrap: nowrap; min-height: 44px;
    }
    #logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--green);
      text-shadow: 2px 2px 0 var(--green-dark);
      cursor: pointer; text-decoration: none;
      flex-shrink: 0;
    }
    .tbadge {
      font-size: 9px; padding: 2px 6px; border-radius: 3px;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      white-space: nowrap;
    }
    #yt-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; padding: 3px 7px; border-radius: 3px;
      background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.25);
      color: #ff6b6b; white-space: nowrap;
    }
    #yt-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yt); animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #user-top { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .av-sm {
      width: 26px; height: 26px; background: var(--green-dark);
      border: 1.5px solid var(--green); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--green);
      flex-shrink: 0;
    }
    #btn-leave {
      font-family: 'Pixelify Sans', monospace; font-size: 10px; padding: 4px 10px;
      background: transparent; border: 1.5px solid rgba(200,80,80,0.4);
      border-radius: 4px; color: #e07070; cursor: pointer; transition: all 0.2s;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
      min-height: 32px;
    }
    #btn-leave:hover { background: rgba(200,80,80,0.15); }

    /* ── MAIN GRID ── */
    #main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 285px;
      overflow: hidden; position: relative; z-index: 1;
      transition: grid-template-columns 0.28s ease;
    }
    #main.chat-hidden { grid-template-columns: 1fr 0px; }
    #sidebar { transition: opacity 0.25s ease; overflow: hidden; }
    #main.chat-hidden #sidebar { opacity: 0; pointer-events: none; }

    /* ── CENTER ── */
    #center { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }

    /* ── PLAYER ── */
    #player-area {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #player-box { display: flex; align-items: center; gap: 12px; }

    /* YouTube iframe container — hidden but active */
    #yt-iframe-wrap {
      width: 110px; height: 110px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      border: 2px solid var(--green-dark);
      position: relative; background: #000;
    }
    #yt-iframe-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    /* Thumbnail overlay (shown when nothing playing) */
    #yt-thumb {
      position: absolute; inset: 0;
      background: var(--green-deep);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--green-dark);
      transition: opacity 0.3s;
    }

    #player-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    #np-track { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #np-artist { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #progress-wrap { display: flex; align-items: center; gap: 6px; }
    #progress-bar {
      flex: 1; height: 4px; background: var(--green-dark);
      border-radius: 2px; overflow: hidden; cursor: default;
    }
    #progress-fill { height: 100%; background: var(--yt); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
    .prog-time { font-size: 9px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    #controls { display: flex; align-items: center; gap: 8px; }
    .ctrl-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; padding: 4px; border-radius: 4px;
      transition: color 0.15s; line-height: 1;
    }
    .ctrl-btn:hover { color: var(--text); }
    #btn-play-pause {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--yt); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; transition: all 0.15s; flex-shrink: 0;
    }
    #btn-play-pause:hover { background: #ff3333; transform: scale(1.06); }
    #vol-wrap { display: flex; align-items: center; gap: 5px; margin-left: auto; }
    #vol-slider {
      -webkit-appearance: none; width: 60px; height: 3px;
      background: var(--green-dark); border-radius: 2px; outline: none; cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--green); cursor: pointer;
    }
    .bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; flex-shrink: 0; }
    .bars .b {
      width: 3px; background: var(--yt); border-radius: 1px; height: 40%;
      animation: bounce 0.9s ease-in-out infinite;
    }
    .bars .b:nth-child(2){animation-delay:.15s} .bars .b:nth-child(3){animation-delay:.3s} .bars .b:nth-child(4){animation-delay:.08s}
    .bars.off .b { animation-play-state: paused; height: 25% !important; }
    @keyframes bounce { 0%,100%{height:25%} 50%{height:100%} }

    /* ── BOTTOM TABS ── */
    #bottom-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 8px;
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--muted); background: transparent; border: none;
      cursor: pointer; letter-spacing: 1px;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel.hidden { display: none; }

    #search-form {
      display: flex; gap: 8px; padding: 9px 16px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .text-inp {
      flex: 1; background: rgba(0,0,0,0.45);
      border: 1.5px solid var(--green-dark); border-radius: 5px;
      padding: 7px 12px; color: var(--text);
      font-family: 'Pixelify Sans', monospace; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .text-inp:focus { border-color: var(--green); }
    .text-inp::placeholder { color: rgba(116,198,157,0.35); }
    .green-btn {
      font-family: 'Pixelify Sans', monospace; font-size: 12px; padding: 7px 14px;
      background: var(--green-dark); border: 1.5px solid var(--green);
      border-radius: 5px; color: var(--green-light); cursor: pointer;
      letter-spacing: 1px; transition: all 0.2s; white-space: nowrap;
    }
    .green-btn:hover { background: var(--green); color: var(--bg); }
    .green-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* URL paste form */
    #url-form {
      display: flex; gap: 8px; padding: 6px 16px 9px;
      flex-shrink: 0;
    }
    #url-form .text-inp { font-size: 11px; }

    .scroll-list { flex: 1; overflow-y: auto; padding: 6px 16px; }
    .scroll-list::-webkit-scrollbar { width: 3px; }
    .scroll-list::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

    /* Track card */
    .track-card {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 9px; border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.18s; margin-bottom: 3px;
    }
    .track-card:hover { background: var(--surface2); border-color: var(--border); }
    .track-card.playing { background: var(--surface); border-color: var(--border2); }
    .t-num {
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--green-dark); width: 14px; text-align: center; flex-shrink: 0;
    }
    .track-card.playing .t-num { color: var(--yt); }
    .t-art {
      width: 42px; height: 42px; border-radius: 4px;
      background: var(--green-deep); border: 1px solid var(--green-dark);
      flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--green-dark);
    }
    .t-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .t-info { flex: 1; min-width: 0; }
    .t-name { font-size: 12px; color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-sub { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-dur { font-size: 9px; color: var(--muted); flex-shrink: 0; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 4px; border-radius: 3px; transition: all 0.15s; flex-shrink: 0; line-height: 1;
    }
    .btn-play-now { font-size: 14px; color: rgba(255,0,0,0.4); }
    .btn-play-now:hover { color: var(--yt); }
    .btn-add-q { font-size: 16px; color: var(--green-dark); }
    .btn-add-q:hover { color: var(--green); }
    .btn-rm { font-size: 12px; color: rgba(200,80,80,0.35); }
    .btn-rm:hover { color: #e07070; background: rgba(200,80,80,0.1); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; height: 90px;
    }
    .empty-icon { font-size: 22px; color: var(--green-dark); }
    .empty-txt {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--green-dark); letter-spacing: 2px; text-align: center;
    }

    /* ── SIDEBAR ── */
    #sidebar { display: flex; flex-direction: column; overflow: hidden; }
    #parts-panel { border-bottom: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; }
    .panel-ttl {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--green); letter-spacing: 2px; margin-bottom: 8px;
    }
    #parts-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
    #parts-list::-webkit-scrollbar { width: 3px; }
    #parts-list::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
    .part {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 7px; border-radius: 5px; background: var(--surface);
    }
    .p-av {
      width: 22px; height: 22px; border-radius: 3px;
      background: var(--green-deep); border: 1.5px solid var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--green); flex-shrink: 0;
    }
    .p-av.me { border-color: var(--yt); }
    .p-nm { font-size: 11px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .p-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; }
    .p-dot.me { background: var(--yt); }

    /* ── CHAT ── */
    #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-msgs {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #chat-msgs::-webkit-scrollbar { width: 3px; }
    #chat-msgs::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
    .msg { display: flex; flex-direction: column; gap: 2px; }
    .msg-hdr { display: flex; align-items: center; gap: 5px; }
    .msg-nick { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--green-light); }
    .msg-nick.me { color: var(--yt); }
    .msg-time { font-size: 10px; color: rgba(116,198,157,0.3); }
    .msg-txt { font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .msg.sys .msg-hdr { display: none; }
    .msg.sys .msg-txt { font-size: 11px; color: var(--muted); font-style: italic; }
    #chat-form {
      display: flex; gap: 5px; padding: 6px 12px 8px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #chat-input {
      flex: 1; background: rgba(0,0,0,0.45);
      border: 1.5px solid var(--green-dark); border-radius: 5px;
      padding: 6px 9px; color: var(--text);
      font-family: 'Pixelify Sans', monospace; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: var(--green); }
    #chat-input::placeholder { color: rgba(116,198,157,0.3); }
    #btn-send {
      font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 6px 9px;
      background: var(--green-dark); border: 1.5px solid var(--green);
      border-radius: 5px; color: var(--green-light); cursor: pointer; transition: all 0.2s;
    }
    #btn-send:hover { background: var(--green); color: var(--bg); }

    /* ── CLOSE CHAT BTN ── */
    #btn-close-chat {
      background: transparent; border: none; cursor: pointer;
      color: rgba(116,198,157,0.45); font-size: 14px; padding: 2px 4px;
      border-radius: 3px; transition: color 0.15s; line-height: 1;
    }
    #btn-close-chat:hover { color: #e07070; }

    /* ── BTN OPEN CHAT (mobile flutuante) ── */
    #btn-open-chat {
      display: none;
      position: fixed; bottom: 20px; right: 16px; z-index: 500;
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--green-dark); border: 2px solid var(--green);
      color: var(--green-light); font-size: 20px;
      cursor: pointer; align-items: center; justify-content: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-open-chat:hover { background: var(--green); color: var(--bg); }
    #btn-open-chat:active { transform: scale(0.95); }
    #btn-open-chat.visible { display: flex; }

    /* ── SIDEBAR MOBILE ── */
    @media (max-width: 640px) {
      #main { grid-template-columns: 1fr !important; }
      #sidebar {
        position: fixed;
        /* top is set dynamically via JS to match topbar height */
        top: var(--topbar-h, 44px); right: 0; bottom: 0;
        width: min(300px, 90vw);
        background: rgba(10,21,16,0.98);
        border-left: 1px solid var(--border);
        transform: translateX(100%);
        transition: transform 0.3s ease, opacity 0.3s ease !important;
        z-index: 400;
        display: flex; flex-direction: column;
        opacity: 1 !important; pointer-events: auto !important;
        will-change: transform;
      }
      #sidebar.chat-open-mobile { transform: translateX(0); }
      #main.chat-hidden #sidebar { transform: translateX(100%) !important; opacity: 1 !important; }
      #btn-close-chat { font-size: 18px; color: rgba(116,198,157,0.6); }
      #chat-msgs { -webkit-overflow-scrolling: touch; }

      /* Topbar — hide some badges to save space, but keep nick visible */
      #yt-badge { display: none; }
      #topbar > span:first-of-type { display: none; } /* ▸ arrow */
      #topbar > span + span { display: none; } /* "sala global" text */
      #nick-top { display: inline; font-size: 10px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .tbadge { font-size: 8px; padding: 2px 5px; }
      #cnt-badge { display: none; } /* hide online count to make room for nick */

      /* Player compact on mobile */
      #yt-iframe-wrap { width: 80px; height: 80px; }
      #np-track { font-size: 13px; }
      #np-artist { font-size: 11px; }
      #vol-slider { width: 50px; }
      #progress-wrap { gap: 4px; }

      /* Search/queue panels — touch-friendly inputs */
      .text-inp { font-size: 16px; padding: 10px 12px; }
      .green-btn { font-size: 13px; padding: 10px 14px; }
      #search-form { padding: 10px 12px; }
      #url-form { padding: 8px 12px 10px; }

      /* Chat form touch-friendly */
      #chat-input { font-size: 16px; padding: 10px 10px; }
      #btn-send { padding: 10px 12px; font-size: 7px; }
      #chat-form { padding: 8px 10px 12px; }

      /* Tabs bigger tap targets */
      .tab { padding: 11px 8px; font-size: 6px; }
    }

    /* Very small screens */
    @media (max-width: 360px) {
      #logo { font-size: 8px; }
      #yt-iframe-wrap { width: 68px; height: 68px; }
      #np-track { font-size: 12px; }
      #vol-wrap { display: none; }
      #player-area { padding: 10px 10px 8px; }
    }

    /* Touch device improvements */
    @media (hover: none) {
      #btn-leave:active { background: rgba(200,80,80,0.2); }
      .ctrl-btn:active { color: var(--text); }
      .tab:active { color: var(--green); }
      .track-card:active { background: var(--surface2); }
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(10,21,16,0.97); border: 1.5px solid var(--green);
      border-radius: 6px; padding: 8px 18px;
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: var(--green-light); letter-spacing: 1px;
      transition: transform 0.3s ease; z-index: 9998;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <a id="logo" href="/">HYNORA</a>
  <span style="color:var(--green-dark)">▸</span>
  <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--green-light)">sala global</span>
  <span class="tbadge" id="cnt-badge">0 online</span>
  <div id="yt-badge"><div class="dot"></div><span>YouTube</span></div>
  <div id="user-top">
    <div class="av-sm" id="av-top">?</div>
    <span id="nick-top">...</span>
    <button id="btn-leave">SAIR</button>
  </div>
</div>

<div id="main">
  <!-- CENTER -->
  <div id="center">

    <!-- Player -->
    <div id="player-area">
      <div id="player-box">
        <!-- YouTube iframe (tiny, serves as actual player) -->
        <div id="yt-iframe-wrap">
          <div id="yt-thumb">♪</div>
          <div id="yt-player"></div>
        </div>

        <div id="player-info">
          <div id="np-track">Nenhuma música tocando</div>
          <div id="np-artist">—</div>
          <div id="progress-wrap">
            <span class="prog-time" id="time-cur">0:00</span>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <span class="prog-time" id="time-tot">0:00</span>
          </div>
          <div id="controls">
            <div class="bars off" id="bars">
              <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
            </div>
            <button id="btn-play-pause" disabled title="Reprodução automática">▶</button>
            <div id="vol-wrap">
              <span style="font-size:11px;color:var(--muted)">🔊</span>
              <input type="range" id="vol-slider" min="0" max="100" value="80">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div id="bottom-area">
      <div id="tabs">
        <button class="tab active" onclick="switchTab('search')">+ ADICIONAR LINK</button>
        <button class="tab" onclick="switchTab('queue')">♪ FILA (<span id="q-count">0</span>)</button>
      </div>

      <!-- Adicionar por link -->
      <div class="panel" id="panel-search">
        <div style="padding:14px;display:flex;flex-direction:column;gap:10px;">
          <div style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;">COLE O LINK DO YOUTUBE</div>
          <div style="display:flex;gap:8px;">
            <input class="text-inp" type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." inputmode="url" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
            <button class="green-btn" id="btn-url">+FILA</button>
          </div>
          <div id="url-status" style="font-size:11px;color:var(--muted);min-height:16px;"></div>
        </div>
      </div>

      <!-- Queue -->
      <div class="panel hidden" id="panel-queue">
        <div class="scroll-list" id="queue-list">
          <div class="empty-state">
            <div class="empty-icon">♪</div>
            <div class="empty-txt">FILA VAZIA</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="parts-panel">
      <div class="panel-ttl">▸ ONLINE AGORA</div>
      <div id="parts-list">
        <div class="empty-state" style="height:40px">
          <div class="empty-txt">NINGUÉM AINDA</div>
        </div>
      </div>
    </div>

    <div id="chat-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0">
        <span style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--green);letter-spacing:2px">▸ CHAT</span>
        <button id="btn-close-chat" title="Fechar chat" onclick="toggleChat()">✕</button>
      </div>
      <div id="chat-msgs"></div>
      <div id="chat-form">
        <input class="text-inp" type="text" id="chat-input" placeholder="Mensagem..." maxlength="200" autocomplete="off" autocorrect="on" autocapitalize="sentences">
        <button id="btn-send">OK</button>
      </div>
    </div>
  </div>
</div>

<button id="btn-open-chat" title="Abrir chat" onclick="toggleChat()">💬</button>
<div id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  // ── ESTADO ──
  let ytPlayer   = null;
  let ytReady    = false;
  let pendingSync = null; // guarda o sync enquanto o player não está pronto
  let queue      = [];
  let isPlaying  = false;
  let currentTrack = null;
  let progressInterval = null;
  let ytStallTimer = null; // watchdog para buffering travado no mobile

  // ── NICK ──
  const myNick  = localStorage.getItem('hynora_nick') || 'visitante_' + Math.floor(Math.random()*999);
  const myInits = myNick.slice(0,2).toUpperCase();
  const myAvatar = localStorage.getItem('hynora_avatar');
  document.getElementById('nick-top').textContent = myNick;
  const avTop = document.getElementById('av-top');
  if (myAvatar) {
    avTop.innerHTML = `<img src="${myAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:3px">`;
    avTop.style.padding = '0';
    avTop.style.overflow = 'hidden';
  } else {
    avTop.textContent = myInits;
  }

  // ── UTILS ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(m, err) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.style.borderColor = err ? '#e07070' : 'var(--green)';
    t.style.color       = err ? '#e07070' : 'var(--green-light)';
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2800);
  }
  function fmtSec(s) {
    s = Math.floor(s || 0);
    return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }
  function nowTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }

  // Extract YouTube video ID from various URL formats
  function extractVideoId(url) {
    url = url.trim();
    // Direct ID (11 chars)
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
      if (u.hostname.includes('youtube.com')) {
        return u.searchParams.get('v') || (u.pathname.startsWith('/embed/') ? u.pathname.split('/')[2] : null);
      }
    } catch(e) {}
    // fallback regex
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // ── YOUTUBE IFRAME API ──
  window.onYouTubeIframeAPIReady = () => {
    ytPlayer = new YT.Player('yt-player', {
      height: '130',
      width: '130',
      videoId: '',
      playerVars: {
        autoplay: 0,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0,
        iv_load_policy: 3,
        origin: window.location.origin,
      },
      events: {
        onReady: () => {
          ytReady = true;
          setVolume(80);
          toast('✓ PLAYER PRONTO!');
          // Se chegou sync do servidor antes do player estar pronto, aplica agora
          if (pendingSync) {
            const { track, positionMs, serverTs } = pendingSync;
            pendingSync = null;
            // Recalcula posição levando em conta o tempo que passou desde o servidor
            const elapsed = Date.now() - serverTs;
            syncPlay(track, positionMs + elapsed);
          }
        },
        onStateChange: (e) => {
          // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0, BUFFERING=3, CUED=5, UNSTARTED=-1
          if (e.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            document.getElementById('btn-play-pause').textContent = '⏸';
            document.getElementById('bars').classList.remove('off');
            document.getElementById('yt-thumb').style.opacity = '0';
            startProgressLoop();
            // Limpa qualquer watchdog pendente
            clearTimeout(ytStallTimer);
          } else if (e.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            document.getElementById('btn-play-pause').textContent = '▶';
            document.getElementById('bars').classList.add('off');
            clearInterval(progressInterval);
            clearTimeout(ytStallTimer);
          } else if (e.data === YT.PlayerState.ENDED) {
            isPlaying = false;
            document.getElementById('btn-play-pause').textContent = '▶';
            document.getElementById('bars').classList.add('off');
            clearInterval(progressInterval);
            clearTimeout(ytStallTimer);
            // Play next in queue automatically, or clear player if queue is empty
            if (queue.length > 0) {
              const next = queue[0];
              socket.emit('removeQueue', next.uri);
              emitPlay(next);
            } else {
              clearPlayer();
            }
          } else if (e.data === YT.PlayerState.BUFFERING) {
            // Watchdog: se ficar em buffering por mais de 8s no mobile, tenta recuperar
            clearTimeout(ytStallTimer);
            ytStallTimer = setTimeout(() => {
              if (ytPlayer && ytPlayer.getPlayerState && ytPlayer.getPlayerState() === YT.PlayerState.BUFFERING) {
                console.warn('Player travado em buffering — tentando recuperar');
                const curTime = ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() : 0;
                ytPlayer.seekTo(curTime, true);
              }
            }, 8000);
          }
        },
      }
    });
  };

  function setVolume(v) {
    if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(v);
  }

  function startProgressLoop() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!ytPlayer || !ytPlayer.getCurrentTime) return;
      const cur = ytPlayer.getCurrentTime() || 0;
      const dur = ytPlayer.getDuration() || 0;
      document.getElementById('time-cur').textContent  = fmtSec(cur);
      document.getElementById('time-tot').textContent  = fmtSec(dur);
      document.getElementById('progress-fill').style.width = dur ? (cur/dur*100)+'%' : '0%';
    }, 500);
  }

  // Play a track object and seek to positionMs
  function syncPlay(track, positionMs) {
    currentTrack = track;

    // Atualiza UI imediatamente mesmo sem player
    document.getElementById('np-track').textContent  = track.name;
    document.getElementById('np-artist').textContent = track.artist;
    if (track.art) {
      document.getElementById('yt-thumb').innerHTML = `<img src="${track.art}" style="width:100%;height:100%;object-fit:cover">`;
    }

    if (!ytReady || !ytPlayer) {
      // Player ainda inicializando — guarda para aplicar no onReady
      pendingSync = { track, positionMs, serverTs: Date.now() };
      return;
    }

    const videoId = track.uri;
    ytPlayer.loadVideoById({ videoId, startSeconds: Math.max(0, Math.floor((positionMs||0)/1000)) });
  }

  // Clear player when queue runs out
  function clearPlayer() {
    currentTrack = null;
    if (ytPlayer && ytReady) ytPlayer.stopVideo();
    document.getElementById('np-track').textContent  = 'Nenhuma música tocando';
    document.getElementById('np-artist').textContent = '—';
    document.getElementById('yt-thumb').style.opacity = '1';
    document.getElementById('yt-thumb').innerHTML = '♪';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('time-cur').textContent = '0:00';
    document.getElementById('time-tot').textContent = '0:00';
    document.getElementById('bars').classList.add('off');
    clearInterval(progressInterval);
  }

  // Toggle chat sidebar (mobile)
  function isMobile() { return window.innerWidth <= 640; }

  function toggleChat() {
    const main    = document.getElementById('main');
    const sidebar = document.getElementById('sidebar');
    const openBtn = document.getElementById('btn-open-chat');

    if (isMobile()) {
      // Mobile: slide in/out via transform
      const isOpen = sidebar.classList.toggle('chat-open-mobile');
      openBtn.classList.toggle('visible', !isOpen);
    } else {
      // Desktop: collapse grid column
      const hidden = main.classList.toggle('chat-hidden');
      openBtn.classList.toggle('visible', hidden);
    }
  }

  function initLayout() {
    const main    = document.getElementById('main');
    const sidebar = document.getElementById('sidebar');
    const openBtn = document.getElementById('btn-open-chat');
    if (isMobile()) {
      // Mobile starts with chat closed
      main.classList.remove('chat-hidden');
      sidebar.classList.remove('chat-open-mobile');
      openBtn.classList.add('visible');
    } else {
      // Desktop starts with chat open (normal grid)
      main.classList.remove('chat-hidden');
      sidebar.classList.remove('chat-open-mobile');
      openBtn.classList.remove('visible');
    }
  }
  initLayout();
  window.addEventListener('resize', initLayout);

  // ── KEYBOARD / VIEWPORT FIX (mobile) ──
  // When the virtual keyboard opens, the visual viewport shrinks.
  // We reposition #sidebar so it always sits above the keyboard.
  (function () {
    const sidebar = document.getElementById('sidebar');
    if (!window.visualViewport) return;

    function onViewport() {
      if (!isMobile()) return;
      const vv = window.visualViewport;
      const bottomGap = window.innerHeight - vv.offsetTop - vv.height;
      sidebar.style.top    = vv.offsetTop + 'px';
      sidebar.style.bottom = bottomGap + 'px';
      const msgs = document.getElementById('chat-msgs');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }

    window.visualViewport.addEventListener('resize', onViewport);
    window.visualViewport.addEventListener('scroll', onViewport);

    window.addEventListener('resize', () => {
      if (!isMobile()) {
        sidebar.style.top = '';
        sidebar.style.bottom = '';
      }
    });
  })();

  // ── SOCKET.IO ──
  const socket = io({
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    timeout: 10000,
  });

  let hasJoined = false;

  function doJoin() {
    const avatar = localStorage.getItem('hynora_avatar') || null;
    socket.emit('join', { nick: myNick, avatar });
    hasJoined = true;
  }

  socket.on('connect', () => {
    doJoin();
  });

  // ── VISIBILIDADE (mobile background/foreground) ──
  let wasHidden = false;

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      // Página foi para background
      wasHidden = true;
      // Para o progress loop para não desperdiçar recursos
      clearInterval(progressInterval);
    } else {
      // Voltou para foreground
      if (wasHidden) {
        wasHidden = false;
        // Resync com o servidor ao voltar
        if (socket.connected) {
          socket.emit('requestSync');
        } else {
          // Socket desconectou enquanto estava em background — vai reconectar automaticamente
          // onReconnect cuida do join
        }
        // Reinicia progress loop se estava tocando
        if (isPlaying && ytPlayer && ytReady) {
          startProgressLoop();
        }
      }
    }
  });

  // ── RESYNC ao voltar do background ──
  socket.on('syncState', ({ currentTrack: track, isPlaying: playing, position }) => {
    if (track) {
      currentTrack = track;
      if (ytReady && ytPlayer) {
        const videoId = track.uri;
        const currentId = ytPlayer.getVideoData ? ytPlayer.getVideoData().video_id : null;
        if (currentId !== videoId) {
          // Música diferente — carrega
          syncPlay(track, position);
        } else {
          // Mesma música — só sincroniza posição se diferença > 3s
          const playerPos = (ytPlayer.getCurrentTime ? ytPlayer.getCurrentTime() * 1000 : 0);
          if (Math.abs(playerPos - position) > 3000) {
            ytPlayer.seekTo(Math.floor(position / 1000), true);
          }
          if (playing && ytPlayer.getPlayerState() !== 1) ytPlayer.playVideo();
          else if (!playing && ytPlayer.getPlayerState() === 1) ytPlayer.pauseVideo();
        }
      } else {
        pendingSync = { track, positionMs: position, serverTs: Date.now() };
      }
    }
  });

  socket.on('welcome', (state) => {
    renderUsers(state.users || []);
    queue = state.queue || [];
    renderQueue();
    if (state.currentTrack) {
      // serverTs: momento em que recebemos o welcome (aproximação do tempo do servidor)
      const positionMs = state.position || 0;
      if (ytReady) {
        syncPlay(state.currentTrack, positionMs);
      } else {
        pendingSync = { track: state.currentTrack, positionMs, serverTs: Date.now() };
      }
    }
    addChatSys('▸ bem-vindo à sala global!');
  });

  socket.on('users', (users) => {
    renderUsers(users);
  });

  socket.on('chat', ({ nick, message, system }) => {
    addChatMsg(nick, message, system);
  });

  socket.on('playTrack', ({ track, startedAt }) => {
    const position = Date.now() - startedAt;
    syncPlay(track, position);
  });

  socket.on('pause', () => {
    if (ytPlayer && ytReady) ytPlayer.pauseVideo();
  });

  socket.on('resume', () => {
    if (ytPlayer && ytReady) ytPlayer.playVideo();
  });

  socket.on('queue', (q) => {
    queue = q;
    renderQueue();
  });

  socket.on('toast', (msg) => toast(msg));

  // Invidious — só para buscar metadados (duração) de links colados
  const INVIDIOUS_INSTANCES = [
    'https://inv.nadeko.net',
    'https://invidious.privacydev.net',
    'https://invidious.nerdvpn.de',
    'https://invidious.lunar.icu',
    'https://iv.melmac.space',
  ];

  // ── EMIT AÇÕES ──
  function emitPlay(track) {
    socket.emit('playTrack', track);
    syncPlay(track, 0);
  }

  function emitAddQueue(track) {
    socket.emit('addQueue', track);
  }

  function emitRemoveQueue(uri) {
    socket.emit('removeQueue', uri);
  }

  // ── QUEUE ──
  function renderQueue() {
    const el = document.getElementById('queue-list');
    document.getElementById('q-count').textContent = queue.length;
    if (!queue.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">♪</div><div class="empty-txt">FILA VAZIA</div></div>`;
      return;
    }
    el.innerHTML = queue.map((it,i) => {
      const isOwner = (it.addedBy === myNick);
      const rmBtn = isOwner
        ? `<button class="icon-btn btn-rm" title="Remover da fila" onclick="emitRemoveQueue('${esc(it.uri)}')">✕</button>`
        : `<span style="width:20px;flex-shrink:0"></span>`;
      return `
      <div class="track-card">
        <span class="t-num">${i+1}</span>
        <div class="t-art">${it.art ? `<img src="${it.art}" alt="">` : '♪'}</div>
        <div class="t-info">
          <div class="t-name">${esc(it.name)}</div>
          <div class="t-sub">${esc(it.artist)} · por ${esc(it.addedBy||'?')}</div>
        </div>
        <span class="t-dur">${esc(it.dur||'')}</span>
        ${rmBtn}
      </div>`;
    }).join('');
  }

  // ── AVATARES dos outros usuários (nick → dataUrl)
  const avatarMap = {};

  // ── PARTICIPANTS ──
  function renderUsers(users) {
    const el = document.getElementById('parts-list');
    document.getElementById('cnt-badge').textContent = users.length + ' online';

    // Atualiza mapa de avatares
    users.forEach(u => {
      if (u.avatar) avatarMap[u.nick] = u.avatar;
    });

    if (!users.length) {
      el.innerHTML = `<div class="empty-state" style="height:40px"><div class="empty-txt">NINGUÉM</div></div>`;
      return;
    }
    el.innerHTML = users.map(u => {
      const nick   = u.nick;
      const av     = u.avatar;
      const isMe   = nick === myNick;
      const avHtml = av
        ? `<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:2px">`
        : esc(nick.slice(0,2).toUpperCase());
      return `
        <div class="part">
          <div class="p-av ${isMe?'me':''}" style="${av?'padding:0;overflow:hidden;':''}">${avHtml}</div>
          <div class="p-nm">${esc(nick)}${isMe?' (você)':''}</div>
          <div class="p-dot ${isMe?'me':''}"></div>
        </div>`;
    }).join('');
  }

  // ── CHAT ──
  function avatarHtml(nick, size) {
    const av = avatarMap[nick] || (nick === myNick ? localStorage.getItem('hynora_avatar') : null);
    const s  = size || 20;
    if (av) {
      return `<img src="${av}" style="width:${s}px;height:${s}px;border-radius:3px;object-fit:cover;flex-shrink:0;border:1px solid var(--green-dark)">`;
    }
    return `<div style="width:${s}px;height:${s}px;border-radius:3px;background:var(--green-deep);border:1px solid var(--green-dark);display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:5px;color:var(--green);flex-shrink:0">${esc(nick.slice(0,2).toUpperCase())}</div>`;
  }
  function addChatSys(txt) {
    const el = document.getElementById('chat-msgs');
    const d = document.createElement('div');
    d.className = 'msg sys';
    d.innerHTML = `<div class="msg-txt">${esc(txt)}</div>`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
  }

  function addChatMsg(nick, message, system) {
    const el = document.getElementById('chat-msgs');
    const d  = document.createElement('div');
    if (system) {
      d.className = 'msg sys';
      d.innerHTML = `<div class="msg-txt">${esc(message)}</div>`;
    } else {
      const isMe = nick === myNick;
      d.className = 'msg';
      d.style.cssText = 'display:flex;gap:7px;align-items:flex-start';
      d.innerHTML = `
        ${avatarHtml(nick, 24)}
        <div style="flex:1;min-width:0">
          <div class="msg-hdr">
            <span class="msg-nick${isMe?' me':''}">${esc(nick.toUpperCase())}</span>
            <span class="msg-time">${nowTime()}</span>
          </div>
          <div class="msg-txt">${esc(message)}</div>
        </div>`;
    }
    el.appendChild(d); el.scrollTop = el.scrollHeight;
  }

  function sendChat() {
    const inp = document.getElementById('chat-input');
    const txt = inp.value.trim();
    if (!txt) return;
    socket.emit('chat', txt);
    inp.value = '';
  }

  // ── TABS ──
  function switchTab(tab) {
    document.getElementById('panel-search').classList.toggle('hidden', tab !== 'search');
    document.getElementById('panel-queue').classList.toggle('hidden', tab !== 'queue');
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='search')||(i===1&&tab==='queue')));
  }

  // ── CONTROLS ──
  // btn-play-pause is disabled — playback is automatic and controlled by the queue

  // No prev/next controls — playback is fully automatic via queue

  document.getElementById('vol-slider').addEventListener('input', e => setVolume(Number(e.target.value)));

  // Progress bar is display-only — seeking is disabled to keep all users in sync
  // document.getElementById('progress-bar') click intentionally not bound

  document.getElementById('btn-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key==='Enter') sendChat(); });
  // URL / link — adiciona à fila (ou toca imediatamente se não tiver nada tocando)
  document.getElementById('btn-url').addEventListener('click', async () => {
    const raw = document.getElementById('url-input').value.trim();
    if (!raw) return;
    const videoId = extractVideoId(raw);
    if (!videoId) { toast('\u26a0 Link inválido', true); return; }

    const btn = document.getElementById('btn-url');
    const statusEl = document.getElementById('url-status');
    btn.textContent = '...'; btn.disabled = true;
    statusEl.textContent = 'Buscando informações do vídeo...';

    let track = {
      uri: videoId,
      name: '',
      artist: '',
      dur: '',
      art: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
    };

    // Estratégia 1: oEmbed do YouTube — sempre funciona, retorna título e canal
    try {
      const res = await fetch(
        `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`,
        { signal: AbortSignal.timeout(5000) }
      );
      if (res.ok) {
        const d = await res.json();
        if (d.title)        track.name   = d.title;
        if (d.author_name)  track.artist = d.author_name;
      }
    } catch(e) { /* fallback abaixo */ }

    // Estratégia 2: Invidious sem ?fields (mais compatível) — pega duração
    if (!track.name || !track.dur) {
      for (const base of INVIDIOUS_INSTANCES) {
        try {
          const res = await fetch(`${base}/api/v1/videos/${videoId}`,
            { signal: AbortSignal.timeout(4000) });
          if (!res.ok) continue;
          const d = await res.json();
          if (!track.name   && d.title)         track.name   = d.title;
          if (!track.artist && d.author)        track.artist = d.author;
          if (!track.dur    && d.lengthSeconds) track.dur    = fmtSec(d.lengthSeconds);
          break;
        } catch(e) { /* try next */ }
      }
    }

    // Fallback final se ainda não tiver nada
    if (!track.name)   track.name   = 'YouTube: ' + videoId;
    if (!track.artist) track.artist = '—';

    statusEl.textContent = '';
    document.getElementById('url-input').value = '';
    btn.textContent = '+FILA'; btn.disabled = false;

    // Se não tiver nada tocando, toca agora; senão adiciona à fila
    if (!currentTrack) {
      emitPlay(track);
    } else {
      emitAddQueue(track);
      toast('\u266a ADICIONADO À FILA: ' + track.name.slice(0,30));
      switchTab('queue');
    }
  });
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-url').click(); });

  document.getElementById('btn-leave').addEventListener('click', () => { window.location.href = '/'; });

  // ── MOBILE: topbar height → CSS var so sidebar doesn't overlap it ──
  function updateTopbarHeight() {
    const h = document.getElementById('topbar').getBoundingClientRect().height;
    document.documentElement.style.setProperty('--topbar-h', h + 'px');
  }
  updateTopbarHeight();
  window.addEventListener('resize', updateTopbarHeight);

  // ── MOBILE: keep chat-form visible when virtual keyboard opens ──
  if (window.visualViewport) {
    function onViewportChange() {
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth > 640) { sidebar.style.bottom = ''; return; }
      const offset = window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop;
      sidebar.style.bottom = (offset > 0 ? offset : 0) + 'px';
    }
    window.visualViewport.addEventListener('resize', onViewportChange);
    window.visualViewport.addEventListener('scroll', onViewportChange);
  }
</script>
</body>
</html>
