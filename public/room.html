<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hynora — Sala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --green:       #40916C;
      --green-dark:  #174732;
      --green-deep:  #0d2b1e;
      --green-light: #52b788;
      --green-pale:  #74c69d;
      --bg:          #0a1510;
      --surface:     rgba(23,71,50,0.25);
      --surface2:    rgba(64,145,108,0.12);
      --border:      rgba(64,145,108,0.22);
      --border2:     rgba(64,145,108,0.5);
      --text:        #d8f3dc;
      --muted:       #74c69d;
      --yt:          #FF0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pixelify Sans', monospace;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* ── TOPBAR ── */
    #topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,21,16,0.97);
      backdrop-filter: blur(10px); flex-shrink: 0;
    }
    #logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: var(--green);
      text-shadow: 2px 2px 0 var(--green-dark);
      cursor: pointer; text-decoration: none;
    }
    .tbadge {
      font-size: 9px; padding: 2px 8px; border-radius: 3px;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    }
    #yt-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; padding: 3px 9px; border-radius: 3px;
      background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.25);
      color: #ff6b6b;
    }
    #yt-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yt); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #user-top { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .av-sm {
      width: 26px; height: 26px; background: var(--green-dark);
      border: 1.5px solid var(--green); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--green);
    }
    #btn-leave {
      font-family: 'Pixelify Sans', monospace; font-size: 10px; padding: 3px 10px;
      background: transparent; border: 1.5px solid rgba(200,80,80,0.4);
      border-radius: 4px; color: #e07070; cursor: pointer; transition: all 0.2s;
    }
    #btn-leave:hover { background: rgba(200,80,80,0.15); }

    /* ── MAIN GRID ── */
    #main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 285px;
      overflow: hidden; position: relative; z-index: 1;
    }

    /* ── CENTER ── */
    #center { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }

    /* ── PLAYER ── */
    #player-area {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #player-box { display: flex; align-items: center; gap: 16px; }

    /* YouTube iframe container — hidden but active */
    #yt-iframe-wrap {
      width: 88px; height: 88px; flex-shrink: 0;
      border-radius: 6px; overflow: hidden;
      border: 2px solid var(--green-dark);
      position: relative; background: #000;
    }
    #yt-iframe-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    /* Thumbnail overlay (shown when nothing playing) */
    #yt-thumb {
      position: absolute; inset: 0;
      background: var(--green-deep);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--green-dark);
      transition: opacity 0.3s;
    }

    #player-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 7px; }
    #np-track { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #np-artist { font-size: 11px; color: var(--muted); }
    #progress-wrap { display: flex; align-items: center; gap: 8px; }
    #progress-bar {
      flex: 1; height: 4px; background: var(--green-dark);
      border-radius: 2px; overflow: hidden; cursor: pointer;
    }
    #progress-fill { height: 100%; background: var(--yt); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
    .prog-time { font-size: 9px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    #controls { display: flex; align-items: center; gap: 10px; }
    .ctrl-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; padding: 4px; border-radius: 4px;
      transition: color 0.15s; line-height: 1;
    }
    .ctrl-btn:hover { color: var(--text); }
    #btn-play-pause {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--yt); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; transition: all 0.15s;
    }
    #btn-play-pause:hover { background: #ff3333; transform: scale(1.06); }
    #vol-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    #vol-slider {
      -webkit-appearance: none; width: 70px; height: 3px;
      background: var(--green-dark); border-radius: 2px; outline: none; cursor: pointer;
    }
    #vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--green); cursor: pointer;
    }
    .bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; flex-shrink: 0; }
    .bars .b {
      width: 3px; background: var(--yt); border-radius: 1px; height: 40%;
      animation: bounce 0.9s ease-in-out infinite;
    }
    .bars .b:nth-child(2){animation-delay:.15s} .bars .b:nth-child(3){animation-delay:.3s} .bars .b:nth-child(4){animation-delay:.08s}
    .bars.off .b { animation-play-state: paused; height: 25% !important; }
    @keyframes bounce { 0%,100%{height:25%} 50%{height:100%} }

    /* ── BOTTOM TABS ── */
    #bottom-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab {
      flex: 1; padding: 8px;
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--muted); background: transparent; border: none;
      cursor: pointer; letter-spacing: 1px;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel.hidden { display: none; }

    #search-form {
      display: flex; gap: 8px; padding: 9px 16px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .text-inp {
      flex: 1; background: rgba(0,0,0,0.45);
      border: 1.5px solid var(--green-dark); border-radius: 5px;
      padding: 7px 12px; color: var(--text);
      font-family: 'Pixelify Sans', monospace; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    .text-inp:focus { border-color: var(--green); }
    .text-inp::placeholder { color: rgba(116,198,157,0.35); }
    .green-btn {
      font-family: 'Pixelify Sans', monospace; font-size: 12px; padding: 7px 14px;
      background: var(--green-dark); border: 1.5px solid var(--green);
      border-radius: 5px; color: var(--green-light); cursor: pointer;
      letter-spacing: 1px; transition: all 0.2s; white-space: nowrap;
    }
    .green-btn:hover { background: var(--green); color: var(--bg); }
    .green-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* URL paste form */
    #url-form {
      display: flex; gap: 8px; padding: 6px 16px 9px;
      flex-shrink: 0;
    }
    #url-form .text-inp { font-size: 11px; }

    .scroll-list { flex: 1; overflow-y: auto; padding: 6px 16px; }
    .scroll-list::-webkit-scrollbar { width: 3px; }
    .scroll-list::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }

    /* Track card */
    .track-card {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 9px; border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.18s; margin-bottom: 3px;
    }
    .track-card:hover { background: var(--surface2); border-color: var(--border); }
    .track-card.playing { background: var(--surface); border-color: var(--border2); }
    .t-num {
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--green-dark); width: 14px; text-align: center; flex-shrink: 0;
    }
    .track-card.playing .t-num { color: var(--yt); }
    .t-art {
      width: 42px; height: 42px; border-radius: 4px;
      background: var(--green-deep); border: 1px solid var(--green-dark);
      flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--green-dark);
    }
    .t-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .t-info { flex: 1; min-width: 0; }
    .t-name { font-size: 12px; color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-sub { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-dur { font-size: 9px; color: var(--muted); flex-shrink: 0; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 4px; border-radius: 3px; transition: all 0.15s; flex-shrink: 0; line-height: 1;
    }
    .btn-play-now { font-size: 14px; color: rgba(255,0,0,0.4); }
    .btn-play-now:hover { color: var(--yt); }
    .btn-add-q { font-size: 16px; color: var(--green-dark); }
    .btn-add-q:hover { color: var(--green); }
    .btn-rm { font-size: 12px; color: rgba(200,80,80,0.35); }
    .btn-rm:hover { color: #e07070; background: rgba(200,80,80,0.1); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; height: 90px;
    }
    .empty-icon { font-size: 22px; color: var(--green-dark); }
    .empty-txt {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--green-dark); letter-spacing: 2px; text-align: center;
    }

    /* ── SIDEBAR ── */
    #sidebar { display: flex; flex-direction: column; overflow: hidden; }
    #parts-panel { border-bottom: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; }
    .panel-ttl {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--green); letter-spacing: 2px; margin-bottom: 8px;
    }
    #parts-list { display: flex; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
    #parts-list::-webkit-scrollbar { width: 3px; }
    #parts-list::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
    .part {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 7px; border-radius: 5px; background: var(--surface);
    }
    .p-av {
      width: 22px; height: 22px; border-radius: 3px;
      background: var(--green-deep); border: 1.5px solid var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--green); flex-shrink: 0;
    }
    .p-av.me { border-color: var(--yt); }
    .p-nm { font-size: 11px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .p-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; }
    .p-dot.me { background: var(--yt); }

    /* ── CHAT ── */
    #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-msgs {
      flex: 1; overflow-y: auto; padding: 8px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #chat-msgs::-webkit-scrollbar { width: 3px; }
    #chat-msgs::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
    .msg { display: flex; flex-direction: column; gap: 2px; }
    .msg-hdr { display: flex; align-items: center; gap: 5px; }
    .msg-nick { font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--green-light); }
    .msg-nick.me { color: var(--yt); }
    .msg-time { font-size: 9px; color: rgba(116,198,157,0.3); }
    .msg-txt { font-size: 11px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .msg.sys .msg-hdr { display: none; }
    .msg.sys .msg-txt { font-size: 9px; color: var(--muted); font-style: italic; }
    #chat-form {
      display: flex; gap: 5px; padding: 6px 12px 8px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #chat-input {
      flex: 1; background: rgba(0,0,0,0.45);
      border: 1.5px solid var(--green-dark); border-radius: 5px;
      padding: 6px 9px; color: var(--text);
      font-family: 'Pixelify Sans', monospace; font-size: 12px; outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: var(--green); }
    #chat-input::placeholder { color: rgba(116,198,157,0.3); }
    #btn-send {
      font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 6px 9px;
      background: var(--green-dark); border: 1.5px solid var(--green);
      border-radius: 5px; color: var(--green-light); cursor: pointer; transition: all 0.2s;
    }
    #btn-send:hover { background: var(--green); color: var(--bg); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(10,21,16,0.97); border: 1.5px solid var(--green);
      border-radius: 6px; padding: 8px 18px;
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: var(--green-light); letter-spacing: 1px;
      transition: transform 0.3s ease; z-index: 9998;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 2px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <a id="logo" href="/">HYNORA</a>
  <span style="color:var(--green-dark)">▸</span>
  <span style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--green-light)">sala global</span>
  <span class="tbadge" id="cnt-badge">0 online</span>
  <div id="yt-badge"><div class="dot"></div><span>YouTube</span></div>
  <div id="user-top">
    <div class="av-sm" id="av-top">?</div>
    <span id="nick-top">...</span>
    <button id="btn-leave">SAIR</button>
  </div>
</div>

<div id="main">
  <!-- CENTER -->
  <div id="center">

    <!-- Player -->
    <div id="player-area">
      <div id="player-box">
        <!-- YouTube iframe (tiny, serves as actual player) -->
        <div id="yt-iframe-wrap">
          <div id="yt-thumb">♪</div>
          <div id="yt-player"></div>
        </div>

        <div id="player-info">
          <div id="np-track">Nenhuma música tocando</div>
          <div id="np-artist">—</div>
          <div id="progress-wrap">
            <span class="prog-time" id="time-cur">0:00</span>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <span class="prog-time" id="time-tot">0:00</span>
          </div>
          <div id="controls">
            <div class="bars off" id="bars">
              <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
            </div>
            <button class="ctrl-btn" id="btn-prev" title="Anterior">⏮</button>
            <button id="btn-play-pause">▶</button>
            <button class="ctrl-btn" id="btn-next" title="Próximo">⏭</button>
            <div id="vol-wrap">
              <span style="font-size:11px;color:var(--muted)">🔊</span>
              <input type="range" id="vol-slider" min="0" max="100" value="80">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div id="bottom-area">
      <div id="tabs">
        <button class="tab active" onclick="switchTab('search')">▸ BUSCAR MÚSICA</button>
        <button class="tab" onclick="switchTab('queue')">♪ FILA (<span id="q-count">0</span>)</button>
      </div>

      <!-- Search -->
      <div class="panel" id="panel-search">
        <div id="search-form">
          <input class="text-inp" type="text" id="search-input" placeholder="Buscar no YouTube...">
          <button class="green-btn" id="btn-search">BUSCAR</button>
        </div>
        <!-- URL direct paste -->
        <div id="url-form">
          <input class="text-inp" type="text" id="url-input" placeholder="Ou cole um link do YouTube aqui...">
          <button class="green-btn" id="btn-url">▶</button>
        </div>
        <div class="scroll-list" id="search-results">
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-txt">BUSQUE UMA MÚSICA ACIMA</div>
          </div>
        </div>
      </div>

      <!-- Queue -->
      <div class="panel hidden" id="panel-queue">
        <div class="scroll-list" id="queue-list">
          <div class="empty-state">
            <div class="empty-icon">♪</div>
            <div class="empty-txt">FILA VAZIA</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="parts-panel">
      <div class="panel-ttl">▸ ONLINE AGORA</div>
      <div id="parts-list">
        <div class="empty-state" style="height:40px">
          <div class="empty-txt">NINGUÉM AINDA</div>
        </div>
      </div>
    </div>

    <div id="chat-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0">
        <span style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--green);letter-spacing:2px">▸ CHAT</span>
      </div>
      <div id="chat-msgs"></div>
      <div id="chat-form">
        <input class="text-inp" type="text" id="chat-input" placeholder="Mensagem..." maxlength="200">
        <button id="btn-send">OK</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  // ── ESTADO ──
  let ytPlayer   = null;
  let ytReady    = false;
  let queue      = [];
  let isPlaying  = false;
  let currentTrack = null;
  let progressInterval = null;

  // ── NICK ──
  const myNick  = localStorage.getItem('hynora_nick') || 'visitante_' + Math.floor(Math.random()*999);
  const myInits = myNick.slice(0,2).toUpperCase();
  document.getElementById('nick-top').textContent = myNick;
  document.getElementById('av-top').textContent   = myInits;

  // ── UTILS ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(m, err) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.style.borderColor = err ? '#e07070' : 'var(--green)';
    t.style.color       = err ? '#e07070' : 'var(--green-light)';
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2800);
  }
  function fmtSec(s) {
    s = Math.floor(s || 0);
    return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }
  function nowTime() {
    const d = new Date();
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }

  // Extract YouTube video ID from various URL formats
  function extractVideoId(url) {
    url = url.trim();
    // Direct ID (11 chars)
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    try {
      const u = new URL(url);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
      if (u.hostname.includes('youtube.com')) {
        return u.searchParams.get('v') || (u.pathname.startsWith('/embed/') ? u.pathname.split('/')[2] : null);
      }
    } catch(e) {}
    // fallback regex
    const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  // ── YOUTUBE IFRAME API ──
  window.onYouTubeIframeAPIReady = () => {
    ytPlayer = new YT.Player('yt-player', {
      height: '88',
      width: '88',
      videoId: '',
      playerVars: {
        autoplay: 0,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0,
        iv_load_policy: 3,
        origin: window.location.origin,
      },
      events: {
        onReady: () => {
          ytReady = true;
          setVolume(80);
          toast('✓ PLAYER PRONTO!');
        },
        onStateChange: (e) => {
          // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0, BUFFERING=3
          if (e.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            document.getElementById('btn-play-pause').textContent = '⏸';
            document.getElementById('bars').classList.remove('off');
            document.getElementById('yt-thumb').style.opacity = '0';
            startProgressLoop();
          } else if (e.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            document.getElementById('btn-play-pause').textContent = '▶';
            document.getElementById('bars').classList.add('off');
            clearInterval(progressInterval);
          } else if (e.data === YT.PlayerState.ENDED) {
            isPlaying = false;
            document.getElementById('btn-play-pause').textContent = '▶';
            document.getElementById('bars').classList.add('off');
            clearInterval(progressInterval);
            // Play next in queue automatically
            if (queue.length > 0) {
              const next = queue[0];
              socket.emit('removeQueue', next.uri);
              socket.emit('playTrack', next);
            }
          }
        },
      }
    });
  };

  function setVolume(v) {
    if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(v);
  }

  function startProgressLoop() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!ytPlayer || !ytPlayer.getCurrentTime) return;
      const cur = ytPlayer.getCurrentTime() || 0;
      const dur = ytPlayer.getDuration() || 0;
      document.getElementById('time-cur').textContent  = fmtSec(cur);
      document.getElementById('time-tot').textContent  = fmtSec(dur);
      document.getElementById('progress-fill').style.width = dur ? (cur/dur*100)+'%' : '0%';
    }, 500);
  }

  // Play a track object and seek to positionMs
  function syncPlay(track, positionMs) {
    currentTrack = track;
    if (!ytReady || !ytPlayer) return;

    const videoId = track.uri; // we store videoId as uri
    document.getElementById('np-track').textContent  = track.name;
    document.getElementById('np-artist').textContent = track.artist;
    if (track.art) {
      document.getElementById('yt-thumb').innerHTML = `<img src="${track.art}" style="width:100%;height:100%;object-fit:cover">`;
    }

    ytPlayer.loadVideoById({ videoId, startSeconds: Math.max(0, Math.floor((positionMs||0)/1000)) });
  }

  // ── SOCKET.IO ──
  const socket = io();

  socket.on('connect', () => {
    socket.emit('join', myNick);
  });

  socket.on('welcome', (state) => {
    renderUsers(state.users);
    queue = state.queue || [];
    renderQueue();
    if (state.currentTrack) {
      syncPlay(state.currentTrack, state.position || 0);
    }
    addChatSys('▸ bem-vindo à sala global!');
  });

  socket.on('users', (users) => {
    renderUsers(users);
    document.getElementById('cnt-badge').textContent = users.length + ' online';
  });

  socket.on('chat', ({ nick, message, system }) => {
    addChatMsg(nick, message, system);
  });

  socket.on('playTrack', ({ track, startedAt }) => {
    const position = Date.now() - startedAt;
    syncPlay(track, position);
  });

  socket.on('pause', () => {
    if (ytPlayer && ytReady) ytPlayer.pauseVideo();
  });

  socket.on('resume', () => {
    if (ytPlayer && ytReady) ytPlayer.playVideo();
  });

  socket.on('queue', (q) => {
    queue = q;
    renderQueue();
  });

  socket.on('toast', (msg) => toast(msg));

  // ── SEARCH via YouTube Data API (via server proxy) ──
  // Falls back to invidious public API which doesn't require key
  async function searchYouTube(query) {
    try {
      // Use Invidious public instance as search proxy (no API key needed)
      const res = await fetch(
        `https://inv.nadeko.net/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,author,lengthSeconds,videoThumbnails`
      );
      if (!res.ok) throw new Error('search failed');
      const data = await res.json();
      return data.slice(0, 10).map(v => ({
        uri: v.videoId,
        name: v.title,
        artist: v.author,
        dur: fmtSec(v.lengthSeconds),
        art: (v.videoThumbnails?.find(t=>t.quality==='medium') || v.videoThumbnails?.[0])?.url || '',
      }));
    } catch(e) {
      console.error('Search error:', e);
      toast('⚠ Erro na busca, tente o link direto', true);
      return [];
    }
  }

  function renderSearchResults(tracks) {
    const el = document.getElementById('search-results');
    if (!tracks.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-txt">NENHUM RESULTADO</div></div>`;
      return;
    }
    el.innerHTML = tracks.map((t,i) => `
      <div class="track-card">
        <span class="t-num">${i+1}</span>
        <div class="t-art">${t.art ? `<img src="${t.art}" alt="" onerror="this.parentNode.textContent='♪'">` : '♪'}</div>
        <div class="t-info">
          <div class="t-name">${esc(t.name)}</div>
          <div class="t-sub">${esc(t.artist)}</div>
        </div>
        <span class="t-dur">${esc(t.dur||'')}</span>
        <button class="icon-btn btn-play-now" title="Tocar agora para todos"
          onclick='emitPlay(${JSON.stringify(t)})'>▶</button>
        <button class="icon-btn btn-add-q" title="Adicionar à fila"
          onclick='emitAddQueue(${JSON.stringify(t)})'>+</button>
      </div>`).join('');
  }

  // ── EMIT AÇÕES ──
  function emitPlay(track) {
    socket.emit('playTrack', track);
    syncPlay(track, 0);
  }

  function emitAddQueue(track) {
    socket.emit('addQueue', track);
  }

  function emitRemoveQueue(uri) {
    socket.emit('removeQueue', uri);
  }

  // ── QUEUE ──
  function renderQueue() {
    const el = document.getElementById('queue-list');
    document.getElementById('q-count').textContent = queue.length;
    if (!queue.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">♪</div><div class="empty-txt">FILA VAZIA</div></div>`;
      return;
    }
    el.innerHTML = queue.map((it,i) => `
      <div class="track-card">
        <span class="t-num">${i+1}</span>
        <div class="t-art">${it.art ? `<img src="${it.art}" alt="">` : '♪'}</div>
        <div class="t-info">
          <div class="t-name">${esc(it.name)}</div>
          <div class="t-sub">${esc(it.artist)} · por ${esc(it.addedBy||'?')}</div>
        </div>
        <span class="t-dur">${esc(it.dur||'')}</span>
        <button class="icon-btn btn-play-now" onclick='emitPlay(${JSON.stringify(it)})'>▶</button>
        <button class="icon-btn btn-rm" onclick="emitRemoveQueue('${esc(it.uri)}')">✕</button>
      </div>`).join('');
  }

  // ── PARTICIPANTS ──
  function renderUsers(users) {
    const el = document.getElementById('parts-list');
    document.getElementById('cnt-badge').textContent = users.length + ' online';
    if (!users.length) {
      el.innerHTML = `<div class="empty-state" style="height:40px"><div class="empty-txt">NINGUÉM</div></div>`;
      return;
    }
    el.innerHTML = users.map(nick => `
      <div class="part">
        <div class="p-av ${nick===myNick?'me':''}">${esc(nick.slice(0,2).toUpperCase())}</div>
        <div class="p-nm">${esc(nick)}${nick===myNick?' (você)':''}</div>
        <div class="p-dot ${nick===myNick?'me':''}"></div>
      </div>`).join('');
  }

  // ── CHAT ──
  function addChatSys(txt) {
    const el = document.getElementById('chat-msgs');
    const d = document.createElement('div');
    d.className = 'msg sys';
    d.innerHTML = `<div class="msg-txt">${esc(txt)}</div>`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
  }

  function addChatMsg(nick, message, system) {
    const el = document.getElementById('chat-msgs');
    const d = document.createElement('div');
    if (system) {
      d.className = 'msg sys';
      d.innerHTML = `<div class="msg-txt">${esc(message)}</div>`;
    } else {
      d.className = 'msg';
      const isMe = nick === myNick;
      d.innerHTML = `
        <div class="msg-hdr">
          <span class="msg-nick${isMe?' me':''}">${esc(nick.toUpperCase())}</span>
          <span class="msg-time">${nowTime()}</span>
        </div>
        <div class="msg-txt">${esc(message)}</div>`;
    }
    el.appendChild(d); el.scrollTop = el.scrollHeight;
  }

  function sendChat() {
    const inp = document.getElementById('chat-input');
    const txt = inp.value.trim();
    if (!txt) return;
    socket.emit('chat', txt);
    inp.value = '';
  }

  // ── TABS ──
  function switchTab(tab) {
    document.getElementById('panel-search').classList.toggle('hidden', tab !== 'search');
    document.getElementById('panel-queue').classList.toggle('hidden', tab !== 'queue');
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='search')||(i===1&&tab==='queue')));
  }

  // ── CONTROLS ──
  document.getElementById('btn-play-pause').addEventListener('click', () => {
    if (!ytReady) return;
    if (isPlaying) {
      ytPlayer.pauseVideo();
      socket.emit('pause');
    } else {
      ytPlayer.playVideo();
      socket.emit('resume');
    }
  });

  // Prev/Next cycle through queue
  document.getElementById('btn-prev').addEventListener('click', () => {
    if (ytPlayer && ytReady) ytPlayer.seekTo(0, true);
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    if (queue.length > 0) {
      const next = queue[0];
      socket.emit('removeQueue', next.uri);
      emitPlay(next);
    } else {
      toast('FILA VAZIA', true);
    }
  });

  document.getElementById('vol-slider').addEventListener('input', e => setVolume(Number(e.target.value)));

  // Progress bar click to seek
  document.getElementById('progress-bar').addEventListener('click', (e) => {
    if (!ytPlayer || !ytReady) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const dur = ytPlayer.getDuration() || 0;
    ytPlayer.seekTo(pct * dur, true);
  });

  document.getElementById('btn-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key==='Enter') sendChat(); });
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-search').click(); });

  document.getElementById('btn-search').addEventListener('click', async () => {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const btn = document.getElementById('btn-search');
    btn.textContent = '...'; btn.disabled = true;
    const results = await searchYouTube(q);
    renderSearchResults(results);
    btn.textContent = 'BUSCAR'; btn.disabled = false;
  });

  // URL / link direct play
  document.getElementById('btn-url').addEventListener('click', () => {
    const raw = document.getElementById('url-input').value.trim();
    if (!raw) return;
    const videoId = extractVideoId(raw);
    if (!videoId) { toast('⚠ Link inválido', true); return; }
    // Build a minimal track from the ID — title will show after playing
    const track = {
      uri: videoId,
      name: 'YouTube: ' + videoId,
      artist: '—',
      dur: '',
      art: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
    };
    document.getElementById('url-input').value = '';
    emitPlay(track);
  });
  document.getElementById('url-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('btn-url').click(); });

  document.getElementById('btn-leave').addEventListener('click', () => { window.location.href = '/'; });
</script>
</body>
</html>
