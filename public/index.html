<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hynora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #40916C;
      --green-dark:  #174732;
      --green-deep:  #0d2b1e;
      --green-light: #52b788;
      --green-pale:  #74c69d;
      --bg:          #0a1510;
      --border:      rgba(64,145,108,0.25);
      --border2:     rgba(64,145,108,0.55);
      --text:        #d8f3dc;
      --muted:       #74c69d;
      --yt:          #FF0000;
      --yt-dk:       #cc0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pixelify Sans', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 16px;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.045) 3px, rgba(0,0,0,0.045) 4px);
      pointer-events: none; z-index: 9999;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 55% at 50% 50%, rgba(64,145,108,0.07) 0%, transparent 70%),
        radial-gradient(ellipse at 5% 95%, rgba(255,0,0,0.04) 0%, transparent 40%),
        radial-gradient(ellipse at 95% 5%, rgba(23,71,50,0.15) 0%, transparent 40%);
      pointer-events: none; z-index: 0;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(64,145,108,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(64,145,108,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .note {
      position: fixed;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--green-dark);
      opacity: 0.5;
      animation: floatUp linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh); opacity: 0; }
      8%   { opacity: 0.5; }
      92%  { opacity: 0.5; }
      100% { transform: translateY(-8vh); opacity: 0; }
    }

    #container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(22px, 8vw, 38px);
      color: var(--green);
      text-shadow: 4px 4px 0 var(--green-dark), 8px 8px 0 rgba(23,71,50,0.35);
      letter-spacing: 4px;
      animation: glitch 7s infinite;
      text-align: center;
    }
    @keyframes glitch {
      0%,93%,100% { text-shadow: 4px 4px 0 var(--green-dark), 8px 8px 0 rgba(23,71,50,0.35); }
      94% { text-shadow: -2px 0 #FF0000, 2px 0 var(--green-dark); transform: skewX(-1deg); }
      95% { text-shadow: 2px 0 var(--green), -2px 0 #FF0000; transform: skewX(1deg); }
      96% { text-shadow: 4px 4px 0 var(--green-dark), 8px 8px 0 rgba(23,71,50,0.35); transform: none; }
    }
    #logo-sub {
      font-size: 10px; color: var(--green-light);
      letter-spacing: 6px; text-transform: uppercase; opacity: 0.65;
      text-align: center; margin-top: -16px;
    }

    #card {
      background: rgba(10,21,16,0.85);
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      padding: clamp(18px, 5vw, 30px) clamp(16px, 5vw, 34px);
      width: min(340px, 100%);
      display: flex; flex-direction: column; gap: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 0 50px rgba(64,145,108,0.08), inset 0 0 0 1px rgba(64,145,108,0.04);
    }

    .field-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: var(--muted);
      letter-spacing: 2px; margin-bottom: 6px;
    }

    #nick-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1.5px solid var(--green-dark);
      border-radius: 6px;
      padding: 13px 14px;
      color: var(--text);
      font-family: 'Pixelify Sans', monospace;
      font-size: 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center; letter-spacing: 1px;
      -webkit-appearance: none;
    }
    #nick-input:focus { border-color: var(--green); box-shadow: 0 0 10px rgba(64,145,108,0.15); }
    #nick-input::placeholder { color: rgba(116,198,157,0.3); letter-spacing: 2px; }

    #nick-error { font-size: 10px; color: #e07070; text-align: center; min-height: 14px; }

    /* YouTube info badge */
    #yt-info {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.25);
      border-radius: 6px; font-size: 10px; color: #ff6b6b;
    }
    #yt-info svg { width: 16px; height: 16px; flex-shrink: 0; }

    #btn-enter {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; letter-spacing: 2px;
      padding: 16px;
      background: transparent;
      border: 2px solid var(--green);
      border-radius: 6px; color: var(--green);
      cursor: pointer; transition: all 0.22s;
      position: relative; overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    #btn-enter::before {
      content: ''; position: absolute; inset: 0;
      background: var(--green);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.22s; z-index: 0;
    }
    #btn-enter:hover::before { transform: scaleX(1); }
    #btn-enter:hover { color: var(--bg); }
    #btn-enter span { position: relative; z-index: 1; }

    .deco { display: flex; justify-content: center; gap: 7px; }
    .deco-d { width: 5px; height: 5px; border-radius: 50%; background: var(--green-dark); transition: background 0.3s; }
    .deco-d.on { background: var(--green); }

    #footer { font-size: 9px; color: rgba(116,198,157,0.3); letter-spacing: 1px; text-align: center; }

    /* ── AVATAR ── */
    #avatar-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #avatar-preview-wrap { position: relative; width: 72px; height: 72px; cursor: pointer; }
    #avatar-preview {
      width: 72px; height: 72px; border-radius: 8px;
      background: var(--green-deep); border: 2px solid var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--green-dark);
      overflow: hidden; transition: border-color 0.2s;
    }
    #avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 6px; }
    #avatar-overlay {
      position: absolute; inset: 0; border-radius: 8px;
      background: rgba(10,21,16,0.72);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s; font-size: 20px;
    }
    #avatar-preview-wrap:hover #avatar-overlay { opacity: 1; }
    #avatar-preview-wrap:hover #avatar-preview { border-color: var(--green); }
    #avatar-input { display: none; }
    #avatar-hint { font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--muted); letter-spacing: 1px; }
    #avatar-remove {
      font-size: 10px; color: rgba(200,80,80,0.5); background: transparent;
      border: none; cursor: pointer; font-family: 'Pixelify Sans', monospace; display: none;
    }
    #avatar-remove:hover { color: #e07070; }
    #avatar-size-warn { font-size: 9px; color: #e07070; text-align: center; min-height: 13px; }

    /* ── MOBILE ── */
    @media (max-width: 400px) {
      #logo-sub { font-size: 8px; letter-spacing: 3px; }
      #container { gap: 20px; }
      #yt-info { font-size: 9px; padding: 7px 10px; }
    }

    @media (hover: none) {
      #btn-enter::before { display: none; }
      #btn-enter:active { background: var(--green); color: var(--bg); }
      #avatar-overlay { opacity: 1; background: rgba(10,21,16,0.5); }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="note" style="left:7%;animation-duration:17s;animation-delay:0s">♪</div>
<div class="note" style="left:19%;animation-duration:23s;animation-delay:4s">♫</div>
<div class="note" style="left:34%;animation-duration:15s;animation-delay:8s">♩</div>
<div class="note" style="left:54%;animation-duration:21s;animation-delay:1s">♬</div>
<div class="note" style="left:69%;animation-duration:26s;animation-delay:6s">♪</div>
<div class="note" style="left:84%;animation-duration:18s;animation-delay:10s">♫</div>
<div class="note" style="left:93%;animation-duration:20s;animation-delay:3s">♩</div>

<div id="container">
  <div id="logo">HYNORA</div>
  <div id="logo-sub">▸ music rooms</div>

  <div id="card">
    <!-- Avatar -->
    <div id="avatar-section">
      <div id="avatar-preview-wrap" onclick="document.getElementById('avatar-input').click()">
        <div id="avatar-preview">👤</div>
        <div id="avatar-overlay">📷</div>
      </div>
      <div id="avatar-hint">CLIQUE PARA ADICIONAR FOTO</div>
      <div id="avatar-size-warn"></div>
      <button id="avatar-remove" onclick="removeAvatar()">✕ remover foto</button>
      <input type="file" id="avatar-input" accept="image/*">
    </div>

    <!-- Nick -->
    <div>
      <div class="field-label">seu nick na sala</div>
      <input type="text" id="nick-input" placeholder="pixel_user_99" maxlength="20" autocomplete="off" spellcheck="false">
      <div id="nick-error"></div>
    </div>

    <!-- YouTube info -->
    <div id="yt-info">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      Powered by YouTube — sem necessidade de conta
    </div>

    <!-- Entrar -->
    <button id="btn-enter"><span>▸ ENTRAR NA SALA</span></button>

    <div class="deco">
      <div class="deco-d on" id="d1"></div>
      <div class="deco-d on" id="d2"></div>
      <div class="deco-d" id="d3"></div>
      <div class="deco-d" id="d4"></div>
    </div>
  </div>

  <div id="footer">OUÇA JUNTO COM SEUS AMIGOS EM TEMPO REAL</div>
</div>

<script>
  const nickInput = document.getElementById('nick-input');
  const nickError = document.getElementById('nick-error');
  const dots = [1,2,3,4].map(i => document.getElementById('d'+i));

  const saved = localStorage.getItem('hynora_nick');
  if (saved) { nickInput.value = saved; dots.forEach(d => d.classList.add('on')); }

  // ── AVATAR ──
  const savedAvatar = localStorage.getItem('hynora_avatar');
  if (savedAvatar) showAvatarPreview(savedAvatar);

  function showAvatarPreview(dataUrl) {
    document.getElementById('avatar-preview').innerHTML = `<img src="${dataUrl}" alt="avatar">`;
    document.getElementById('avatar-hint').textContent   = 'CLIQUE PARA TROCAR';
    document.getElementById('avatar-remove').style.display = 'inline';
  }

  function removeAvatar() {
    localStorage.removeItem('hynora_avatar');
    document.getElementById('avatar-preview').innerHTML   = '👤';
    document.getElementById('avatar-hint').textContent    = 'CLIQUE PARA ADICIONAR FOTO';
    document.getElementById('avatar-remove').style.display = 'none';
    document.getElementById('avatar-size-warn').textContent = '';
  }

  document.getElementById('avatar-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      document.getElementById('avatar-size-warn').textContent = '⚠ imagem muito grande (máx 5MB)';
      return;
    }
    document.getElementById('avatar-size-warn').textContent = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        // Redimensiona para 64x64 via canvas para não pesar no localStorage/socket
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        // Crop centralizado
        const size = Math.min(img.width, img.height);
        const sx = (img.width  - size) / 2;
        const sy = (img.height - size) / 2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 64, 64);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        localStorage.setItem('hynora_avatar', dataUrl);
        showAvatarPreview(dataUrl);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    // reset input so same file can be picked again
    e.target.value = '';
  });

  // ── NICK ──
  nickInput.addEventListener('input', () => {
    nickError.textContent = '';
    const l = nickInput.value.trim().length;
    dots.forEach((d, i) => d.classList.toggle('on', i < Math.ceil(l / 5)));
    if (l >= 20) dots.forEach(d => d.classList.add('on'));
  });

  document.getElementById('btn-enter').addEventListener('click', () => {
    const nick = nickInput.value.trim();
    if (!nick) { nickError.textContent = '⚠ insira um nick'; nickInput.focus(); return; }
    if (nick.length < 2) { nickError.textContent = '⚠ nick muito curto'; return; }
    if (!/^[a-zA-Z0-9_\-.]+$/.test(nick)) { nickError.textContent = '⚠ use apenas letras, números e _ - .'; return; }
    localStorage.setItem('hynora_nick', nick);
    document.getElementById('container').style.transition = 'opacity 0.3s';
    document.getElementById('container').style.opacity = '0';
    setTimeout(() => window.location.href = '/room', 300);
  });

  nickInput.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-enter').click(); });
</script>
</body>
</html>
